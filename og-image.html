<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    /* This page renders the OG image at 1200x630. Open in browser and screenshot, or use a headless browser to capture as PNG. */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:1200px; height:630px; overflow:hidden; background:#0b0f19; font-family:'Inter',-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; position:relative; }
    .glow1 { position:absolute; top:-150px; left:-100px; width:500px; height:500px; background:radial-gradient(circle,rgba(91,140,255,0.15),transparent 70%); }
    .glow2 { position:absolute; bottom:-100px; right:-50px; width:400px; height:400px; background:radial-gradient(circle,rgba(91,140,255,0.08),transparent 70%); }
    .content { position:relative; z-index:1; display:flex; align-items:center; gap:60px; padding:0 80px; }
    .logo svg { width:160px; height:160px; }
    .text h1 { font-size:52px; font-weight:800; color:#e6edf3; letter-spacing:-0.03em; line-height:1.15; }
    .text h1 .accent { color:#5b8cff; }
    .text .sub { font-size:20px; font-weight:500; color:#8b949e; margin-top:12px; letter-spacing:0.04em; }
    .text .desc { font-size:16px; color:#6e7681; margin-top:16px; max-width:520px; line-height:1.7; }
    .border-line { position:absolute; bottom:0; left:0; right:0; height:4px; background:linear-gradient(90deg,#5b8cff,transparent); }
    .url { position:absolute; bottom:24px; right:40px; color:#484f58; font-size:14px; font-weight:500; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="logo">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke-linecap="round" stroke-linejoin="round">
          <polygon points="100,20 180,100 100,180 20,100" fill="none" stroke="white" stroke-width="5"/>
          <line x1="100" y1="20" x2="100" y2="180" stroke="white" stroke-width="4"/>
          <line x1="20" y1="100" x2="180" y2="100" stroke="#5b8cff" stroke-width="5"/>
          <line x1="60" y1="60" x2="140" y2="140" stroke="white" stroke-width="3.5" opacity="0.7"/>
          <line x1="140" y1="60" x2="60" y2="140" stroke="white" stroke-width="3.5" opacity="0.7"/>
          <line x1="100" y1="20" x2="100" y2="6" stroke="white" stroke-width="3.5" opacity="0.6"/>
          <line x1="100" y1="180" x2="100" y2="194" stroke="white" stroke-width="3.5" opacity="0.6"/>
          <line x1="20" y1="100" x2="6" y2="100" stroke="white" stroke-width="3.5" opacity="0.6"/>
          <line x1="180" y1="100" x2="194" y2="100" stroke="white" stroke-width="3.5" opacity="0.6"/>
        </g>
        <circle cx="100" cy="20" r="8" fill="white"/>
        <circle cx="180" cy="100" r="8" fill="white"/>
        <circle cx="100" cy="180" r="8" fill="white"/>
        <circle cx="20" cy="100" r="8" fill="white"/>
        <circle cx="100" cy="100" r="7" fill="#5b8cff"/>
        <circle cx="60" cy="60" r="5" fill="white" opacity="0.8"/>
        <circle cx="140" cy="60" r="5" fill="white" opacity="0.8"/>
        <circle cx="60" cy="140" r="5" fill="white" opacity="0.8"/>
        <circle cx="140" cy="140" r="5" fill="white" opacity="0.8"/>
      </svg>
    </div>
    <div class="text">
      <h1><span class="accent">Azalor</span> Technologies</h1>
      <div class="sub">Research-Driven Engineering Studio</div>
      <div class="desc">We build deeply engineered software systems, AI platforms, and scalable products by combining rigorous research with practical implementation.</div>
    </div>
  </div>
  <div class="border-line"></div>
  <div class="url">azalorlabs.github.io/azalor</div>
</body>
</html>
